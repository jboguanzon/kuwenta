services:
  postgres:
    image: postgres:18@sha256:1e731087339b133199cb8e540809aff2bc4ddef76e25c0f1ea3333640b74341a
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kuwenta}
    ports:
      - 5432:5432
    volumes:
     - postgres-data:/var/lib/postgresql
    tmpfs:
      - /tmp
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical
    
  electric:
    image: electricsql/electric:1.4.16@sha256:6d7c23aab402b98785af8211da91d883ac12c565c9a591b1e2705444166846e7
    environment:
      DATABASE_URL: ${ELECTRIC_DATABASE_URL}
      # Not suitable for production.
      # See https://electric-sql.com/docs/guides/security
      ELECTRIC_INSECURE: true
    ports:
      - 3001:3000
    depends_on:
      - postgres

volumes:
  postgres-data:
